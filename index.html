<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0f14;--surface:#161a23;--card:#1c2130;--border:#252c3f;--green:#00e5a0;--red:#ff4d6a;--blue:#4d9fff;--yellow:#ffd166;--orange:#ff9a3c;--purple:#b47fff;--text:#e8eaf2;--muted:#6b7494;--r:14px;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px 13px 60px;}
header{text-align:center;margin-bottom:14px;}
header h1{font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header p{color:var(--muted);font-size:0.7rem;margin-top:2px;}
.month-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.mnav-btn{background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#monthLabel{font-size:0.9rem;font-weight:600;min-width:130px;text-align:center;color:var(--text);}
.month-now-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:0.65rem;padding:3px 9px;cursor:pointer;font-family:'Sora',sans-serif;}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 8px;text-align:center;}
.sum-card .lbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.sum-card .val{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:500;}
.sum-card.g .val{color:var(--green);}.sum-card.r .val{color:var(--red);}.sum-card.n .val{color:var(--blue);}
